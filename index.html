<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Deployer</title>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <!-- Material 3 Root Container -->
  <div id="m3-app" style="display: none;">
    
    <!-- User Profile Header (Top-Left Connection Status) -->
    <div id="profile-header">
      <img id="user-avatar" src="" alt="Avatar">
      <div style="display: flex; flex-direction: column;">
        <span id="user-name"></span>
        <span id="connection-status"></span>
      </div>
      <button id="btn-reset-token" class="m3-icon-btn" style="margin-left: auto;">
        <i data-lucide="log-out"></i>
      </button>
    </div>

    <!-- Page 1: Configure PAT -->
    <div id="view-1" class="view">
      <div class="icon-avatar">
        <i data-lucide="key-round"></i>
      </div>
      <h2 style="font-size: 22px; font-weight: 400; margin-bottom: 8px; color: #ffffff;">Access Token</h2>
      <p style="font-size: 14px; color: #8e8e93; margin-bottom: 24px; line-height: 20px;">Provide a classic or fine-grained GitHub PAT with repository permissions.</p>
      
      <input id="pat-input" type="password" placeholder="ghp_..." autocomplete="off" spellcheck="false" />
      
      <div class="actions-row">
        <a href="https://github.com/settings/tokens/new?scopes=public_repo" target="_blank" class="m3-button-tonal" style="flex: 1; text-decoration: none;">
          <i data-lucide="help-circle"></i>
        </a>
        <button id="pat-submit" class="m3-button" style="flex: 2;">
          <i data-lucide="arrow-right"></i>
        </button>
      </div>
    </div>

    <!-- Page 2: File Drop & Operations -->
    <div id="view-2" class="view">
      
      <!-- State 2a: Neutral File Selector -->
      <div id="state-drop" class="m3-dropzone">
        <div class="icon-avatar" style="background-color: #1a1a1c;">
          <i data-lucide="file-code" style="color: #a8c7fa;"></i>
        </div>
        <h3 style="font-size: 16px; font-weight: 500; color: #ffffff; margin: 0;">Select HTML Bundle</h3>
        <p style="font-size: 12px; color: #8e8e93; margin: 0;">Files are automatically parsed to index.html</p>
        <input type="file" id="file-input" accept=".html" style="display: none;" />
      </div>

      <!-- State 2b: Parallel Dispatch Processing -->
      <div id="state-deploying" style="display: none; flex-direction: column; width: 100%;">
        <div style="display: flex; justify-content: space-around; margin-bottom: 24px;">
          <div id="step-user" class="progress-step"><i data-lucide="user"></i></div>
          <div id="step-repo" class="progress-step"><i data-lucide="git-branch"></i></div>
          <div id="step-file" class="progress-step"><i data-lucide="file-up"></i></div>
          <div id="step-pages" class="progress-step"><i data-lucide="globe"></i></div>
        </div>
        
        <p id="deploy-stage-text" style="font-size: 13px; color: #8e8e93; text-align: center; margin-bottom: 12px;"></p>
        
        <!-- M3 Indeterminate Progress Line -->
        <div class="m3-progress-bar">
          <div class="m3-progress-value"></div>
        </div>
      </div>

      <!-- State 2c: Advanced Error Diagnostics -->
      <div id="state-error" style="display: none; flex-direction: column; align-items: center; width: 100%;">
        <div class="icon-avatar" style="background-color: #2c1614;">
          <i data-lucide="alert-circle" style="color: #ffb4ab;"></i>
        </div>
        <h3 style="font-size: 16px; font-weight: 500; color: #ffb4ab; margin-bottom: 8px;">Pipeline Failure</h3>
        <p id="error-text" style="font-size: 13px; color: #c4c6d0; margin-bottom: 20px; text-align: center; line-height: 18px;"></p>
        
        <div class="actions-row">
          <button id="btn-file-select-retry" class="m3-button-tonal" style="flex: 1;">
            <i data-lucide="arrow-left" style="margin-right: 8px;"></i>Back
          </button>
          <button id="btn-deploy-retry" class="m3-button" style="flex: 1; background-color: #ffb4ab; color: #690005;">
            <i data-lucide="refresh-cw" style="margin-right: 8px;"></i>Retry
          </button>
        </div>
      </div>

    </div>

    <!-- Page 3: Instant Live Production Link -->
    <div id="view-3" class="view">
      <div class="icon-avatar" style="background-color: #0f2d1e;">
        <i data-lucide="rocket" style="color: #38e08a;"></i>
      </div>
      <h2 style="font-size: 22px; font-weight: 400; margin-bottom: 8px; color: #ffffff;">Live!</h2>
      <p style="font-size: 14px; color: #8e8e93; margin-bottom: 24px; line-height: 20px;">Your site is ready on production domains.</p>
      
      <div class="actions-row">
        <a id="link-external" href="#" target="_blank" class="m3-button-tonal" style="flex: 1; text-decoration: none;">
          <i data-lucide="external-link"></i>
        </a>
        <button id="btn-copy" class="m3-button" style="flex: 2;">
          <i data-lucide="copy" style="margin-right: 8px;"></i>Copy
        </button>
        <button id="btn-back" class="m3-button-tonal" style="flex: 1;">
          <i data-lucide="refresh-cw"></i>
        </button>
      </div>
    </div>

  </div>

  <script>
    // Native Mobile & M3 CSS Compilation (JS-Injected dynamically to bypass static styles)
    const styleBlock = document.createElement("style");
    styleBlock.innerHTML = `
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
      }
      body, html {
        background-color: #000000;
        color: #e3e3e3;
        font-family: system-ui, -apple-system, sans-serif;
        width: 100%;
        height: 100%;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        user-select: none;
        -webkit-user-select: none;
        touch-action: none;
      }
      #m3-app {
        background-color: #121212;
        border: 1px solid #232325;
        border-radius: 28px;
        padding: 24px;
        width: 100%;
        max-width: 340px;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.7);
        display: flex;
        flex-direction: column;
        position: relative;
        animation: scaleUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }
      .view {
        display: none;
        flex-direction: column;
        align-items: center;
        animation: slideIn 0.25s cubic-bezier(0.2, 0, 0, 1) forwards;
      }
      .view.active {
        display: flex;
      }
      #profile-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 24px;
        width: 100%;
        border-bottom: 1px solid #1a1a1c;
        padding-bottom: 16px;
      }
      #user-avatar {
        width: 38px;
        height: 38px;
        border-radius: 50%;
        border: 1.5px solid #28282a;
        background-color: #1e1e20;
      }
      #user-name {
        font-size: 13px;
        font-weight: 500;
        color: #ffffff;
      }
      #connection-status {
        font-size: 11px;
        color: #8e8e93;
      }
      .icon-avatar {
        background-color: #1e1e20;
        border-radius: 50%;
        width: 64px;
        height: 64px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 20px;
        color: #ffffff;
      }
      .icon-avatar i {
        width: 28px;
        height: 28px;
      }
      input[type="password"] {
        background-color: #1e1e20;
        border: 1px solid #28282a;
        border-radius: 12px;
        color: #ffffff;
        font-family: monospace;
        font-size: 14px;
        padding: 14px;
        width: 100%;
        text-align: center;
        margin-bottom: 24px;
        outline: none;
        transition: border-color 0.2s, background-color 0.2s;
      }
      input[type="password"]:focus {
        border-color: #a8c7fa;
        background-color: #0b0b0c;
      }
      .actions-row {
        display: flex;
        gap: 12px;
        width: 100%;
      }
      .m3-button {
        background-color: #a8c7fa;
        color: #004a77;
        font-size: 14px;
        font-weight: 500;
        height: 48px;
        border-radius: 100px;
        border: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: transform 0.1s, filter 0.2s;
        outline: none;
      }
      .m3-button:active {
        transform: scale(0.96);
        filter: brightness(0.9);
      }
      .m3-button-tonal {
        background-color: #1e1e20;
        color: #c4c6d0;
        font-size: 14px;
        font-weight: 500;
        height: 48px;
        border-radius: 100px;
        border: 1px solid #2c2c2e;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: transform 0.1s, background-color 0.2s;
        outline: none;
      }
      .m3-button-tonal:active {
        transform: scale(0.96);
        background-color: #2a2a2d;
      }
      .m3-icon-btn {
        background: transparent;
        border: none;
        color: #8e8e93;
        width: 32px;
        height: 32px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: background-color 0.2s, color 0.2s;
      }
      .m3-icon-btn:hover {
        background-color: #242426;
        color: #ffffff;
      }
      .m3-dropzone {
        border: 2px dashed #3c3c3e;
        border-radius: 20px;
        width: 100%;
        padding: 40px 16px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
        cursor: pointer;
        transition: background-color 0.2s, border-color 0.2s;
      }
      .m3-dropzone:active {
        background-color: #161618;
        border-color: #a8c7fa;
      }
      .m3-progress-bar {
        width: 100%;
        height: 4px;
        background-color: #1a1a1c;
        border-radius: 100px;
        overflow: hidden;
        position: relative;
      }
      .m3-progress-value {
        width: 100%;
        height: 100%;
        background-color: #a8c7fa;
        position: absolute;
        animation: m3-bar 1.5s infinite linear;
        transform-origin: 0% 50%;
      }
      .progress-step {
        color: #2c2c2e;
        transition: color 0.3s;
      }
      .progress-step.active {
        color: #ffffff;
        animation: pulse 1s infinite alternate;
      }
      .progress-step.done {
        color: #38e08a;
      }
      @keyframes m3-bar {
        0% { transform: translateX(-100%) scaleX(0.2); }
        50% { transform: translateX(0%) scaleX(0.5); }
        100% { transform: translateX(100%) scaleX(0.2); }
      }
      @keyframes pulse {
        from { opacity: 0.4; }
        to { opacity: 1; }
      }
      @keyframes scaleUp {
        from { transform: scale(0.95); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
      }
      @keyframes slideIn {
        from { transform: translateY(12px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      .shake {
        animation: m3-shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
      }
      @keyframes m3-shake {
        10%, 90% { transform: translate3d(-1px, 0, 0); }
        20%, 80% { transform: translate3d(2px, 0, 0); }
        30%, 50%, 70% { transform: translate3d(-3px, 0, 0); }
        40%, 60% { transform: translate3d(3px, 0, 0); }
      }
    `;
    document.head.appendChild(styleBlock);
  </script>

  <script>
    let currentUrl = "";
    let selectedFileContent = null;

    document.addEventListener("DOMContentLoaded", () => {
      const patInput = document.getElementById("pat-input");
      const patSubmit = document.getElementById("pat-submit");
      const dropzone = document.getElementById("state-drop");
      const fileInput = document.getElementById("file-input");
      const btnResetToken = document.getElementById("btn-reset-token");
      const btnCopy = document.getElementById("btn-copy");
      const btnBack = document.getElementById("btn-back");
      const btnDeployRetry = document.getElementById("btn-deploy-retry");
      const btnFileSelectRetry = document.getElementById("btn-file-select-retry");

      const view1 = document.getElementById("view-1");
      const view2 = document.getElementById("view-2");
      const view3 = document.getElementById("view-3");

      const stateDrop = document.getElementById("state-drop");
      const stateDeploying = document.getElementById("state-deploying");
      const stateError = document.getElementById("state-error");

      const stepUser = document.getElementById("step-user");
      const stepRepo = document.getElementById("step-repo");
      const stepFile = document.getElementById("step-file");
      const stepPages = document.getElementById("step-pages");

      const appContainer = document.getElementById("m3-app");
      appContainer.style.display = "flex"; // Soft mount

      initApp();

      async function initApp() {
        const token = localStorage.getItem("gh_pat");
        const cache = localStorage.getItem("gh_user");

        if (token) {
          showView(2);
          if (cache) {
            applyProfile(JSON.parse(cache));
          } else {
            // Lazy load user info to refresh cache details
            fetchUserSilent(token);
          }
        } else {
          showView(1);
          hideProfile();
        }
        lucide.createIcons();
      }

      function showView(step) {
        view1.classList.remove("active");
        view2.classList.remove("active");
        view3.classList.remove("active");

        if (step === 1) {
          view1.classList.add("active");
        } else if (step === 2) {
          view2.classList.add("active");
          showSubstate("drop");
        } else if (step === 3) {
          view3.classList.add("active");
        }
      }

      function showSubstate(state) {
        stateDrop.style.display = "none";
        stateDeploying.style.display = "none";
        stateError.style.display = "none";

        if (state === "drop") {
          stateDrop.style.display = "flex";
        } else if (state === "deploying") {
          stateDeploying.style.display = "flex";
        } else if (state === "error") {
          stateError.style.display = "flex";
        }
      }

      function updateStage(text) {
        document.getElementById("deploy-stage-text").textContent = text;
      }

      // Safe Profile View Setup
      function applyProfile(userData) {
        document.getElementById("profile-header").style.display = "flex";
        document.getElementById("user-avatar").src = userData.avatar;
        document.getElementById("user-name").textContent = `@${userData.username}`;
        document.getElementById("connection-status").textContent = "verified access";
      }

      function hideProfile() {
        document.getElementById("profile-header").style.display = "none";
      }

      async function fetchUserSilent(token) {
        try {
          const { data } = await githubRequest("/user", token);
          const meta = { username: data.login, avatar: data.avatar_url };
          localStorage.setItem("gh_user", JSON.stringify(meta));
          applyProfile(meta);
        } catch (err) {
          // Token expired or invalid
          localStorage.removeItem("gh_pat");
          localStorage.removeItem("gh_user");
          initApp();
        }
      }

      // Step 1 Submission
      patSubmit.addEventListener("click", async () => {
        const token = patInput.value.trim();
        if (!token) {
          triggerHapticShake();
          return;
        }

        patSubmit.disabled = true;
        patSubmit.innerHTML = `...`;

        try {
          const { headers, data } = await githubRequest("/user", token);
          
          // Fast verification setup
          const userData = { username: data.login, avatar: data.avatar_url };
          localStorage.setItem("gh_pat", token);
          localStorage.setItem("gh_user", JSON.stringify(userData));
          
          applyProfile(userData);
          initApp();
        } catch (err) {
          triggerHapticShake();
        } finally {
          patSubmit.disabled = false;
          patSubmit.innerHTML = `<i data-lucide="arrow-right"></i>`;
          lucide.createIcons();
        }
      });

      btnResetToken.addEventListener("click", () => {
        localStorage.removeItem("gh_pat");
        localStorage.removeItem("gh_user");
        initApp();
      });

      // Drag, Drop, and Native Selector interactions
      dropzone.addEventListener("click", () => fileInput.click());
      dropzone.addEventListener("dragover", (e) => e.preventDefault());
      dropzone.addEventListener("drop", (e) => {
        e.preventDefault();
        if (e.dataTransfer.files.length > 0) {
          parseFile(e.dataTransfer.files[0]);
        }
      });

      fileInput.addEventListener("change", (e) => {
        if (e.target.files.length > 0) {
          parseFile(e.target.files[0]);
        }
      });

      function parseFile(file) {
        if (!file.name.endsWith(".html")) {
          triggerHapticShake();
          return;
        }
        const reader = new FileReader();
        reader.onload = (e) => {
          selectedFileContent = btoa(unescape(encodeURIComponent(e.target.result)));
          deploy();
        };
        reader.onerror = () => {
          showError("Could not parse file bytes.");
        };
        reader.readAsText(file);
      }

      btnDeployRetry.addEventListener("click", () => {
        if (selectedFileContent) deploy();
      });
      btnFileSelectRetry.addEventListener("click", () => {
        selectedFileContent = null;
        fileInput.value = "";
        showSubstate("drop");
      });

      // Speed-Optimized Parallel Pipeline
      async function deploy() {
        const token = localStorage.getItem("gh_pat");
        const cache = JSON.parse(localStorage.getItem("gh_user") || "{}");
        const username = cache.username;

        if (!token || !username) {
          initApp();
          return;
        }

        showSubstate("deploying");
        resetProgressSteps();
        updateStage("Querying remote targets...");

        const repoName = "instant-page";

        try {
          updateStepState(stepUser, "active");
          
          // FAST-PATH Execution: Query all endpoints simultaneously
          const [repoRes, fileRes, pagesRes] = await Promise.allSettled([
            githubRequest(`/repos/${username}/${repoName}`, token),
            githubRequest(`/repos/${username}/${repoName}/contents/index.html`, token),
            githubRequest(`/repos/${username}/${repoName}/pages`, token)
          ]);

          updateStepState(stepUser, "done");
          updateStepState(stepRepo, "active");

          let defaultBranch = "main";
          let repoExists = false;
          let fileSha = null;
          let pagesSetupNeeded = true;

          // Process Repo Response
          if (repoRes.status === "fulfilled") {
            repoExists = true;
            defaultBranch = repoRes.value.data.default_branch || "main";
          } else if (repoRes.reason.status !== 404) {
            throw new Error(`Repository checking failure: ${repoRes.reason.status}`);
          }

          // Process index.html SHA details
          if (fileRes.status === "fulfilled") {
            fileSha = fileRes.value.data.sha;
          }

          // Process Pages Deployment properties
          if (pagesRes.status === "fulfilled") {
            pagesSetupNeeded = false;
          }

          // Create Repo if absent
          if (!repoExists) {
            updateStage("Provisioning sandbox repository...");
            const creation = await githubRequest("/user/repos", token, {
              method: "POST",
              body: JSON.stringify({
                name: repoName,
                private: false,
                auto_init: true,
                description: "instant sandbox hosting"
              })
            });
            defaultBranch = creation.data.default_branch || "main";
            // Wait brief moment for GitHub backend provisioning logic to settle
            await new Promise(r => setTimeout(r, 2000));
          }
          updateStepState(stepRepo, "done");

          // Upload bundle payload
          updateStepState(stepFile, "active");
          updateStage("Uploading code bundle...");
          await githubRequest(`/repos/${username}/${repoName}/contents/index.html`, token, {
            method: "PUT",
            body: JSON.stringify({
              message: "Sandbox production deployment sync",
              content: selectedFileContent,
              sha: fileSha,
              branch: defaultBranch
            })
          });
          updateStepState(stepFile, "done");

          // Run Pages setup if not enabled
          updateStepState(stepPages, "active");
          if (pagesSetupNeeded) {
            updateStage("Deploying production URL...");
            try {
              await githubRequest(`/repos/${username}/${repoName}/pages`, token, {
                method: "POST",
                body: JSON.stringify({
                  source: {
                    branch: defaultBranch,
                    path: "/"
                  }
                })
              });
            } catch (err) {
              console.warn("Pages configuration notice.");
            }
          }
          updateStepState(stepPages, "done");

          currentUrl = `https://${username}.github.io/${repoName}/`;
          document.getElementById("link-external").href = currentUrl;

          setTimeout(() => {
            showView(3);
          }, 800);

        } catch (err) {
          showError(err.message || "Pipeline execution failed.");
        }
      }

      async function githubRequest(endpoint, token, options = {}) {
        const headers = {
          "Authorization": `token ${token}`,
          "Accept": "application/vnd.github+json",
          ...options.headers
        };
        const response = await fetch(`https://api.github.com${endpoint}`, {
          ...options,
          headers
        });
        
        if (!response.ok) {
          const err = new Error(`HTTP ${response.status}`);
          err.status = response.status;
          try {
            const serverMsg = await response.json();
            err.message = serverMsg.message || err.message;
          } catch(e){}
          throw err;
        }
        if (response.status === 204) return { headers: response.headers, data: null };
        const data = await response.json();
        return { headers: response.headers, data };
      }

      function resetProgressSteps() {
        [stepUser, stepRepo, stepFile, stepPages].forEach(step => {
          step.className = "progress-step";
        });
      }

      function updateStepState(el, state) {
        el.className = "progress-step " + state;
      }

      function showError(msg) {
        showSubstate("error");
        document.getElementById("error-text").textContent = msg;
      }

      function triggerHapticShake() {
        appContainer.classList.add("shake");
        appContainer.style.borderColor = "#ff5449";
        setTimeout(() => {
          appContainer.classList.remove("shake");
          appContainer.style.borderColor = "#232325";
        }, 400);
      }

      btnCopy.addEventListener("click", () => {
        navigator.clipboard.writeText(currentUrl).then(() => {
          btnCopy.innerHTML = `<i data-lucide="check" style="color: #38e08a; margin-right: 8px;"></i>Copied`;
          lucide.createIcons();
          setTimeout(() => {
            btnCopy.innerHTML = `<i data-lucide="copy" style="margin-right: 8px;"></i>Copy`;
            lucide.createIcons();
          }, 1500);
        });
      });

      btnBack.addEventListener("click", () => {
        selectedFileContent = null;
        fileInput.value = "";
        showView(2);
      });
    });
  </script>
</body>
</html>
